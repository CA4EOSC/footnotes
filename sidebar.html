<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pale Fire Footnotes</title>
    <!-- Local Tailwind CSS and Marked.js to comply with Extension CSP -->
    <script src="tailwind.js"></script>
    <script src="marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Glassmorphism Styles */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
            line-height: 1.5;
        }

        .bubble-ai {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .bubble-user {
            background-color: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .bubble-ai pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85em;
            font-family: monospace;
        }

        .bubble-ai code {
            font-family: monospace;
            background: #f3f4f6;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .bubble-ai pre code {
            background: transparent;
            padding: 0;
        }

        .bubble p {
            margin-bottom: 0.75rem;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Dots Animation */
        .dots span {
            animation: dotBlur 1.4s infinite both;
            height: 6px;
            width: 6px;
            background: #6b7280;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
        }

        .dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBlur {

            0%,
            80%,
            100% {
                opacity: 0;
                transform: scale(0.6);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Floating Note Button */
        #save-note-btn {
            display: none;
            position: absolute;
            z-index: 50;
            padding: 6px 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, background 0.2s;
        }

        #save-note-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #059669, #047857);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* Action Menu Overlay */
        .action-menu {
            display: none;
            position: absolute;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            z-index: 100;
            min-width: 140px;
            overflow: hidden;
            animation: fadeIn 0.15s ease-out;
        }

        .action-menu.visible {
            display: block;
        }

        .action-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #374151;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }

        .action-item:hover {
            background: #f3f4f6;
        }

        .action-item.danger {
            color: #dc2626;
        }

        .action-item.danger:hover {
            background: #fef2f2;
        }

        .msg-options-btn {
            opacity: 0;
            transition: opacity 0.2s;
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            margin-top: 2px;
        }

        .flex.w-full:hover .msg-options-btn {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="glass flex items-center justify-between px-4 py-3 shadow-sm z-10 relative">
        <div class="flex items-center space-x-2 shrink-0">
            <div
                class="w-6 h-6 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-inner">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="font-semibold text-gray-800 text-sm tracking-wide hidden sm:block">Pale Fire Footnotes</h1>
        </div>

        <!-- Pagination -->
        <div id="pagination-container"
            class="flex flex-1 justify-center items-center space-x-1 overflow-x-auto px-2 mx-2">
            <!-- Pagination buttons generated here -->
        </div>

        <div class="flex items-center space-x-3 shrink-0">
            <button id="switch-focus-btn"
                class="px-2 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded text-xs font-semibold xl:px-3 focus:outline-none transition-colors border border-blue-200 shadow-sm"
                title="Analyze current page in a new dialog">
                Analyze page
            </button>
            <div id="status-indicator" class="flex items-center space-x-1 shrink-0">
                <span class="w-2 h-2 rounded-full bg-red-500" id="status-dot"></span>
                <span class="text-xs text-gray-500 font-medium" id="status-text">Disconnected</span>
            </div>
        </div>
    </div>

    <!-- Floating UI Button for selection -->
    <button id="save-note-btn">📌 Save Note</button>

    <!-- Chat Area -->
    <div id="chat-container" class="chat-container flex flex-col justify-between pb-20 relative">
        <div id="messages-container" class="flex flex-col space-y-4">
            <!-- Messages rendered here -->
        </div>

    </div>

    <!-- Input Area -->
    <div class="glass absolute bottom-0 w-full p-4 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <form id="chat-form"
            class="flex items-end space-x-2 bg-white border border-gray-200 rounded-2xl p-1 shadow-inner focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent transition-all">
            <textarea id="chat-input" rows="1"
                class="flex-grow w-full bg-transparent border-none text-sm text-gray-800 px-3 py-2.5 focus:outline-none resize-none max-h-32"
                placeholder="Ask Pale Fire Footnotes..."></textarea>
            <button type="submit" id="send-btn"
                class="p-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </form>
        <div class="mt-2 text-center pointer-events-auto">
            <p class="text-[10px] text-gray-400 font-medium">Created by <a
                    href="https://www.linkedin.com/in/vyacheslavtikhonov/" target="_blank" rel="noopener noreferrer"
                    class="hover:text-blue-500 cursor-pointer">Slava Tykhonov</a> (<a href="https://codata.org"
                    target="_blank" rel="noopener noreferrer" class="hover:text-blue-500 cursor-pointer">CODATA</a>) |
                Powered by Gemini CLI</p>
        </div>
    </div>

    <!-- Global popup menu for hovering over messages -->
    <div id="global-action-menu" class="action-menu">
        <button id="menu-save-txt" class="action-item">➕ Save QA as Note</button>
        <button id="menu-delete-page" class="action-item danger">➖ Delete Page</button>
    </div>

    <script src="sidebar.js"></script>
</body>

</html>
